      :root {
        --primary: #0088ff;
        --secondary: #00d4ff;
        --bg-body: #05070a;
        --bg-cv: #0f172a;
        --header-bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        --card-bg: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.1);
        --text-main: #ffffff;
        --text-muted: #cbd5e1;
        --aside-bg: rgba(0, 0, 0, 0.15);
      }

      .light-mode {
        --bg-body: #f0f2f5;
        --bg-cv: #ffffff;
        --header-bg: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 100%);
        --card-bg: #f1f5f9;
        --border: #cbd5e1;
        --text-main: #1e293b;
        --text-muted: #475569;
        --aside-bg: #f8fafc;
        --primary: #2563eb;
        --secondary: #0ea5e9;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg-body);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 50px;
        transition: background 0.3s ease;
      }

      .cv-wrapper {
        width: 95%;
        max-width: 210mm;
        min-height: 260mm;
        margin: 20px auto;
        background: var(--bg-cv);
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
      }

      header {
        padding: 25px 40px;
        background: var(--header-bg);
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
        gap: 30px;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }

      .hero-text h1 {
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--text-main);
        line-height: 1.1;
      }
      .hero-text h1 span {
        color: var(--primary);
      }
      .hero-text p {
        font-size: 1rem;
        color: var(--secondary);
        margin-top: 5px;
        font-weight: 600;
      }

      .profile-box img {
        width: 110px;
        height: 110px;
        border-radius: 15px;
        border: 3px solid var(--primary);
        object-fit: cover;
      }

      .contact-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        background: rgba(0, 0, 0, 0.05);
        padding: 15px 40px;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }

      .contact-link {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        color: var(--text-muted);
        text-decoration: none;
      }
      .contact-link i {
        color: var(--primary);
        width: 15px;
      }

      .main-content {
        display: grid;
        grid-template-columns: 260px 1fr;
        flex-grow: 1;
      }

      aside {
        background: var(--aside-bg);
        padding: 25px;
        border-inline-end: 1px solid var(--border);
      }
      main {
        padding: 25px 30px;
      }

      h2 {
        font-size: 1rem;
        text-transform: uppercase;
        color: var(--text-main);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      h2::after {
        content: "";
        height: 1px;
        flex: 1;
        background: linear-gradient(
          to var(--gradient-dir, left),
          var(--primary),
          transparent
        );
      }

      .section {
        margin-bottom: 20px;
      }

      .skill-group {
        margin-bottom: 15px;
      }
      .skill-group p {
        color: var(--secondary);
        font-size: 0.75rem;
        margin-bottom: 5px;
        font-weight: bold;
        border-bottom: 1px solid var(--border);
        display: inline-block;
      }

      .skill-tag {
        background: var(--card-bg);
        border: 1px solid var(--border);
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        margin: 0 2px 4px 0;
        display: inline-block;
        color: var(--text-main);
      }

      .edu-card {
        margin-bottom: 12px;
        border-inline-start: 3px solid var(--primary);
        padding-inline-start: 10px;
      }
      .edu-card h4 {
        font-size: 0.85rem;
        color: var(--text-main);
      }
      .edu-card p {
        font-size: 0.7rem;
        color: var(--text-muted);
      }

      .summary-card {
        background: var(--card-bg);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.5;
        text-align: justify;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .project-item {
        background: var(--card-bg);
        border: 1px solid var(--border);
        padding: 8px;
        border-radius: 6px;
        height: 100%;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        transition: all 0.2s ease;
      }
      .project-item:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
      }
      .project-item h5 {
        color: var(--primary);
        margin-bottom: 2px;
        font-size: 0.75rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .project-item p {
        font-size: 0.65rem;
        color: var(--text-muted);
        line-height: 1.2;
      }

      .toolbar {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        padding: 10px 25px;
        border-radius: 50px;
        display: flex;
        gap: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        z-index: 100;
        border: 1px solid var(--primary);
      }
      .btn-tool {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      [lang="ar"] {
        font-family: "Cairo", sans-serif;
        --gradient-dir: left;
      }
      [lang="en"] {
        font-family: "Inter", sans-serif;
        --gradient-dir: right;
      }

      /* جعل التصميم Responsive للموبايل */
      @media (max-width: 768px) {
        .main-content {
          grid-template-columns: 1fr;
        }
        .project-grid {
          grid-template-columns: 1fr 1fr;
        }
        aside {
          border-inline-end: none;
          border-bottom: 1px solid var(--border);
        }
        .hero-text h1 {
          font-size: 1.5rem; /* صغّر أو كبّر الرقم حسب رغبتك */
        }
      }

      @media (max-width: 480px) {
        .project-grid {
          grid-template-columns: 1fr;
        }
      }
      @media print {
        .toolbar {
          display: none !important;
        }
        body {
          background: white;
          padding: 0;
        }
        .cv-wrapper {
          width: 210mm;
          height: 297mm;
          margin: 0;
          box-shadow: none;
          border: none;
          max-width: none;
        }
        header {
          padding: 15px 30px;
        }
        .main-content {
          grid-template-columns: 220px 1fr;
        }
        .project-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        @page {
          size: A4;
          margin: 0;
        }
        @media print {
        }
      }
    </style>
